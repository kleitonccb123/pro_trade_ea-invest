# ============================================================
# Nginx Production Config — Crypto Trade Hub
# Load balancer for multiple FastAPI API replicas.
# ============================================================
#
# Features:
#   - SSL termination (TLS 1.2 / 1.3)
#   - HTTP → HTTPS redirect
#   - Upstream with keepalive connections to backend replicas
#   - WebSocket proxy support (/ws/)
#   - Gzip compression
#   - Security headers
#   - Static frontend served directly
#
# Place SSL certs at:
#   ./nginx/ssl/fullchain.pem
#   ./nginx/ssl/privkey.pem
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml
               application/json application/javascript
               application/xml+rss application/atom+xml
               image/svg+xml;

    # ── Upstream: FastAPI API replicas ───────────────────────────
    # Docker Swarm / Compose resolve "api" to all replica IPs.
    # Use ip_hash for session affinity or leave as round-robin.
    upstream api_backend {
        least_conn;
        server backend:8000;          # Docker service name resolves replicas
        keepalive 32;                 # Keep connections warm
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Frame-Options          "SAMEORIGIN"          always;
        add_header X-Content-Type-Options   "nosniff"             always;
        add_header X-XSS-Protection         "1; mode=block"       always;
        add_header Referrer-Policy          "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy  "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

        client_max_body_size 10M;
        proxy_read_timeout   60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout   60s;

        # ── Static frontend (React build) ────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }

        # Immutable hashed assets from Vite
        location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── API proxy ─────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # ── WebSocket proxy ───────────────────────────────────────
        location /ws/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;    # Long-lived WebSocket connections
        }

        # ── Health (exposed without auth) ─────────────────────────
        location /health {
            proxy_pass http://api_backend/health;
            access_log off;
        }

        # ── Metrics (restrict to internal/monitoring only) ────────
        location /metrics {
            allow 172.0.0.0/8;   # Docker internal network range
            deny  all;
            proxy_pass http://api_backend/metrics;
        }
    }
}
