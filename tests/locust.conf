# ===============================================
# Configuração do Locust
# ===============================================
# 
# Uso:
#   locust -f locustfile.py --config locust.conf
#
# ===============================================

[locust]
# Arquivo de teste
locustfile = locustfile.py

# Host padrão
host = http://localhost:8000

# Número de usuários (pode ser sobrescrito via CLI)
users = 50

# Taxa de spawn (usuários/segundo)
spawn-rate = 5

# Tempo de execução (ex: 60s, 2m, 1h)
run-time = 2m

# Interface web
web-host = 0.0.0.0
web-port = 8089

# Logs
loglevel = INFO
logfile = locust.log

# Relatório HTML
html = stress_reports/locust_report.html

# Desabilitar reset de stats após spawn completo
reset-stats = false

# Mostrar avisos de exceções
show-task-ratio = true

# Tags para filtrar testes (opcional)
# tags = critical,smoke
# exclude-tags = slow

# Modo headless (para CI/CD, descomente abaixo)
# headless = true
