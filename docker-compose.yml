# ======================================
# Crypto Trade Hub - Docker Compose
# ======================================
# Deploy completo: Frontend + Backend + MongoDB
# 
# Uso:
#   docker-compose up -d              # Inicia todos os serviços
#   docker-compose logs -f            # Ver logs
#   docker-compose down               # Parar tudo
#   docker-compose down -v            # Parar e limpar volumes
#
# Produção:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ======================================

version: '3.8'

services:
  # ==================== MONGODB ====================
  mongodb:
    image: mongo:7.0
    container_name: cth_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-crypto_trade_hub}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - cth_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== REDIS (Cache & Sessions) ====================
  redis:
    image: redis:7-alpine
    container_name: cth_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - cth_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== BACKEND (FastAPI) ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cth_backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # App
      APP_MODE: ${APP_MODE:-production}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-to-a-long-random-string}
      
      # MongoDB
      MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB:-crypto_trade_hub}?authSource=admin
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:8081}
      
      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      
      # Exchange APIs (optional - users add their own)
      # BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      # KUCOIN_API_KEY: ${KUCOIN_API_KEY:-}
      
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_logs:/app/logs
    networks:
      - cth_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== FRONTEND (React + Vite) ====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: cth_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - cth_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== NGINX (Reverse Proxy) ====================
  nginx:
    image: nginx:alpine
    container_name: cth_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - cth_network

# ==================== NETWORKS ====================
networks:
  cth_network:
    driver: bridge

# ==================== VOLUMES ====================
volumes:
  mongodb_data:
    name: cth_mongodb_data
  mongodb_config:
    name: cth_mongodb_config
  redis_data:
    name: cth_redis_data
  backend_logs:
    name: cth_backend_logs
  nginx_logs:
    name: cth_nginx_logs
