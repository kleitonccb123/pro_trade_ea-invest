# Redis Configuration for Production
# Critical settings for persistence and data safety

# Network
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory Management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""  # Log to stdout (Docker)

# RDB Persistence (Snapshot)
# Save database snapshot periodically
save 900 1      # After 900 sec (15 min) if at least 1 key changed
save 300 10     # After 300 sec (5 min) if at least 10 keys changed
save 60 10000   # After 60 sec if at least 10000 keys changed

# RDB snapshot filename
dbfilename dump.rdb

# AOF (Append Only File) - Durable log for every write
# Critical for Kill Switch state and Lock persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec  # Sync to disk every second (balanced)

# AOF Rewrite
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Data Directory
dir /data

# Replication
replica-read-only yes
replica-serve-stale-data yes
repl-diskless-sync no
repl-diskless-sync-delay 5

# Security
# Password (optional, configure via environment variable ideally)
# requirepass yourpassword

# Accept commands only from allowed IPs
# (Redis will be in isolated Docker network)

# Keys eviction
maxmemory-samples 5

# Module loading
# loadmodule /usr/lib/redis/modules/mymodule.so

# Avoid expensive operations
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Always log keyspace notifications for monitoring
notify-keyspace-events "KEA"

# Active defragmentation (for large memory usage)
activedefrag no
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100

# Slow log
slowlog-log-slower-than 10000  # Log queries slower than 10ms
slowlog-max-len 128

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""

# Stop writes when available disk space is below minimum
stop-writes-on-bgsave-error yes

# Compression for RDB files
rdbcompression yes

# Enable extra features
latency-monitor-threshold 0

# Advanced configuration
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000

# HyperLogLog
stream-node-max-bytes 4096
stream-node-max-entries 100

# Monitoring
latency-monitor-threshold 0

# Disable certain operations
# It's safe to leave these as default (enabled) in our isolated network
# client-tracking-info-threshold 1000000
