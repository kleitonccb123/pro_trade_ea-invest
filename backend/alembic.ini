[alembic]
script_location = alembic
sqlalchemy.url = sqlite:///./dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[alembic:exclude]
tables = spatial_ref_sys

[logger_sqlalchemy]
level = INFO
handlers = console
qualname = sqlalchemy
propagate = 0

[logger_alembic]
level = INFO
handlers = console
qualname = alembic
propagate = 0
